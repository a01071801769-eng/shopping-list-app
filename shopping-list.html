<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4338ca; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-row button {
      flex: 1;
      padding: 7px 0;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-row button.active {
      background: #eef2ff;
      border-color: #4f46e5;
      color: #4f46e5;
    }

    .summary {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover { background: #f8fafc; }

    li + li { border-top: 1px solid #f1f5f9; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      transition: color 0.2s;
      word-break: break-all;
    }

    .item-name.done {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #ef4444; background: #fee2e2; }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-done {
      margin-top: 16px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px dashed #e2e8f0;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-done:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }
  </style>
</head>
<body>
<div class="card">
  <h1>🛒 쇼핑 리스트</h1>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="60" />
    <button onclick="addItem()">추가</button>
  </div>

  <div class="filter-row">
    <button class="active" data-filter="all"    onclick="setFilter('all')">전체</button>
    <button              data-filter="pending"  onclick="setFilter('pending')">미완료</button>
    <button              data-filter="done"     onclick="setFilter('done')">완료</button>
  </div>

  <div class="summary" id="summary"></div>

  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">아이템이 없습니다.</div>

  <button class="clear-done" onclick="clearDone()">완료 항목 모두 삭제</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shopping') || '[]');
  let filter = 'all';

  const input   = document.getElementById('itemInput');
  const listEl  = document.getElementById('list');
  const emptyEl = document.getElementById('empty');
  const summaryEl = document.getElementById('summary');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  function save() { localStorage.setItem('shopping', JSON.stringify(items)); }

  function addItem() {
    const name = input.value.trim();
    if (!name) return;
    items.unshift({ id: Date.now(), name, done: false });
    input.value = '';
    save();
    render();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) item.done = !item.done;
    save();
    render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-row button').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    render();
  }

  function render() {
    const total  = items.length;
    const doneN  = items.filter(i => i.done).length;
    summaryEl.textContent = `전체 ${total}개 · 완료 ${doneN}개`;

    const visible = items.filter(i =>
      filter === 'all'     ? true :
      filter === 'pending' ? !i.done :
                              i.done
    );

    listEl.innerHTML = '';
    if (!visible.length) {
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      visible.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem(${item.id})" />
          <span class="item-name${item.done ? ' done' : ''}">${escHtml(item.name)}</span>
          <button class="del-btn" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        `;
        listEl.appendChild(li);
      });
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
